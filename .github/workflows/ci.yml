name: Xiphos CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend route and engine tests
        run: python -m pytest tests/test_engine_parity.py tests/test_api_surface_local.py tests/test_ai_async_flow.py tests/test_entity_resolution_ai.py tests/test_intel_summary_flow.py -q
        env:
          XIPHOS_DB_PATH: /tmp/xiphos_ci.db
          XIPHOS_KG_DB_PATH: /tmp/xiphos_kg_ci.db

      - name: Run scoring validation harness
        run: python tests/test_scoring_validation.py

      - name: Run monitoring scheduler tests
        run: python backend/test_monitor_scheduler.py

      - name: Run backend regression contracts
        run: python -m pytest tests/test_layer_integration.py backend/test_network_risk.py tests/test_security_hygiene.py -q

      - name: Run collector fixture contracts
        run: python -m pytest tests/test_connector_registry_sync.py tests/test_monitor_graph_parity.py tests/test_osint_enrichment_pipeline.py tests/test_sam_gov_connector.py -q
        env:
          XIPHOS_DB_PATH: /tmp/xiphos_collector_ci.db
          XIPHOS_KG_DB_PATH: /tmp/xiphos_collector_kg_ci.db

      - name: Run auth integration tests
        run: |
          cd backend
          python -c "
          import sys, os
          os.environ['XIPHOS_DB_PATH'] = '/tmp/xiphos_auth_ci.db'
          os.environ['XIPHOS_DEV_MODE'] = 'true'
          sys.path.insert(0, '.')
          import db; db.init_db()
          from auth import init_auth_db, AUTH_ENABLED; init_auth_db()
          from server import app

          with app.test_client() as c:
              # Health endpoint works
              r = c.get('/api/health')
              assert r.status_code == 200, f'Health failed: {r.status_code}'

              # Case creation works (dev mode allows anonymous access)
              r = c.post('/api/cases', json={'name': 'CI Test Corp', 'country': 'US'})
              assert r.status_code == 201, f'Create case failed: {r.status_code}'

              # Input validation blocks bad input
              r = c.post('/api/cases', json={'name': \"'; DROP TABLE;\", 'country': 'US'})
              assert r.status_code == 400, f'Validation should block: {r.status_code}'

              # Auth setup works
              r = c.post('/api/auth/setup', json={
                  'email': 'ci@test.com', 'password': 'CITestPass1!', 'name': 'CI'
              })
              assert r.status_code == 201, f'Setup failed: {r.status_code}'

              # Login works
              r = c.post('/api/auth/login', json={'email': 'ci@test.com', 'password': 'CITestPass1!'})
              assert r.status_code == 200, f'Login failed: {r.status_code}'

              # Duplicate setup blocked
              r = c.post('/api/auth/setup', json={'email': 'x@x.com', 'password': 'test1234'})
              assert r.status_code == 400, f'Dup setup should fail: {r.status_code}'

          print('All auth integration tests passed')
          "

      - name: Run hardening tests
        run: |
          cd backend
          python -c "
          import sys, os
          os.environ['XIPHOS_DB_PATH'] = '/tmp/xiphos_hard_ci.db'
          os.environ['XIPHOS_DEV_MODE'] = 'true'
          sys.path.insert(0, '.')
          import db; db.init_db()
          from auth import init_auth_db; init_auth_db()
          from server import app

          with app.test_client() as c:
              # Security headers present
              r = c.get('/api/health')
              assert r.headers.get('X-Content-Type-Options') == 'nosniff'
              assert r.headers.get('X-Frame-Options') == 'DENY'

              # Rate limiting works
              for i in range(7):
                  r = c.post('/api/auth/login', json={'email': f'rl{i}@test.com', 'password': 'wrong123!'})
                  if r.status_code == 429:
                      break
              assert r.status_code == 429, 'Rate limit should trigger'

          print('All hardening tests passed')
          "

      - name: Run local smoke flow
        run: |
          XIPHOS_AUTH_ENABLED=false XIPHOS_DEV_MODE=true XIPHOS_SKIP_SYNC=true python backend/server.py --port 8095 >/tmp/xiphos-smoke.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT

          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8095/api/health || true)
            if [ "$STATUS" = "200" ]; then
              break
            fi
            sleep 2
          done

          python scripts/run_local_smoke.py --base-url http://127.0.0.1:8095
          kill $SERVER_PID || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        run: cd frontend && npm ci && npm run build

      - name: Build Docker image
        run: docker build -t xiphos:ci .

      - name: Smoke test container
        run: |
          docker run -d --name xiphos-ci \
            -e XIPHOS_DATA_DIR=/data \
            -e XIPHOS_AUTH_ENABLED=false \
            -e XIPHOS_SKIP_SYNC=true \
            -p 8080:8080 \
            xiphos:ci

          # Wait for container with retry loop (up to 60 seconds)
          echo "Waiting for Xiphos to start..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              break
            fi
            echo "  Attempt $i: status=$STATUS, retrying..."
            sleep 2
          done

          # Final health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health)
          echo "Final health check: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "=== Container logs ==="
            docker logs xiphos-ci
            exit 1
          fi

          # Frontend serves
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Frontend: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "=== Container logs ==="
            docker logs xiphos-ci
            exit 1
          fi

          echo "All Docker smoke tests passed"
          docker stop xiphos-ci

  backend-tests-postgres:
    name: Backend Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helios_test
          POSTGRES_USER: helios
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U helios -d helios_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Seed PostgreSQL auth and smoke data
        env:
          HELIOS_DB_ENGINE: postgres
          XIPHOS_PG_URL: postgresql://helios:test_password@localhost:5432/helios_test
          XIPHOS_AUTH_ENABLED: "true"
          XIPHOS_SECRET_KEY: ci-test-secret-key-pg
          HELIOS_LOGIN_EMAIL: ci-admin@example.com
          HELIOS_LOGIN_PASSWORD: CITestPass1!
        run: |
          python scripts/seed_ci_workspace.py \
            --email "$HELIOS_LOGIN_EMAIL" \
            --password "$HELIOS_LOGIN_PASSWORD" \
            --name "CI Admin" \
            --case-id "ci-seeded-case" \
            --vendor-name "CI SEEDED EXPORT CASE"

      - name: Start Helios (PostgreSQL backend)
        env:
          HELIOS_DB_ENGINE: postgres
          XIPHOS_PG_URL: postgresql://helios:test_password@localhost:5432/helios_test
          XIPHOS_AUTH_ENABLED: "true"
          XIPHOS_SECRET_KEY: ci-test-secret-key-pg
          XIPHOS_SKIP_SYNC: "true"
        run: |
          gunicorn --bind 0.0.0.0:8090 --chdir backend server:app --daemon --workers 2 --timeout 120
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/api/health || true)
          echo "Health probe status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            exit 1
          fi

      - name: Run integration tests against PostgreSQL
        env:
          HELIOS_BASE_URL: http://localhost:8090
          HELIOS_LOGIN_EMAIL: ci-admin@example.com
          HELIOS_LOGIN_PASSWORD: CITestPass1!
          HELIOS_DB_ENGINE: postgres
          XIPHOS_PG_URL: postgresql://helios:test_password@localhost:5432/helios_test
          XIPHOS_SECRET_KEY: ci-test-secret-key-pg
        run: python tests/test_integration.py

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: pip install -r backend/requirements-dev.txt

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Seed auth and smoke data
        env:
          XIPHOS_DB_PATH: /tmp/xiphos_e2e.db
          XIPHOS_DATA_DIR: /tmp/xiphos_e2e
          XIPHOS_AUTH_ENABLED: "true"
          XIPHOS_SECRET_KEY: ci-test-secret-key-e2e
          HELIOS_LOGIN_EMAIL: ci-admin@example.com
          HELIOS_LOGIN_PASSWORD: CITestPass1!
        run: |
          mkdir -p "$XIPHOS_DATA_DIR"
          python scripts/seed_ci_workspace.py \
            --email "$HELIOS_LOGIN_EMAIL" \
            --password "$HELIOS_LOGIN_PASSWORD" \
            --name "CI Admin" \
            --case-id "ci-seeded-case" \
            --vendor-name "CI SEEDED EXPORT CASE"

      - name: Start Helios server
        env:
          XIPHOS_DB_PATH: /tmp/xiphos_e2e.db
          XIPHOS_DATA_DIR: /tmp/xiphos_e2e
          XIPHOS_AUTH_ENABLED: "true"
          XIPHOS_SECRET_KEY: ci-test-secret-key-e2e
          XIPHOS_SKIP_SYNC: "true"
        run: |
          gunicorn --bind 0.0.0.0:8080 --chdir backend server:app --daemon --timeout 120
          sleep 5

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          HELIOS_BASE_URL: http://localhost:8080
          HELIOS_LOGIN_EMAIL: ci-admin@example.com
          HELIOS_LOGIN_PASSWORD: CITestPass1!
          HELIOS_SEEDED_VENDOR_NAME: CI SEEDED EXPORT CASE
        run: cd tests/e2e && npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/test-results/
          retention-days: 7

  remote-integration:
    name: Remote Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.HELIOS_INTEGRATION_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run hosted integration suite
        env:
          HELIOS_BASE_URL: ${{ secrets.HELIOS_BASE_URL }}
          HELIOS_LOGIN_EMAIL: ${{ secrets.HELIOS_LOGIN_EMAIL }}
          HELIOS_LOGIN_PASSWORD: ${{ secrets.HELIOS_LOGIN_PASSWORD }}
          HELIOS_VERIFY_TLS: ${{ secrets.HELIOS_VERIFY_TLS }}
        run: python tests/test_integration.py
